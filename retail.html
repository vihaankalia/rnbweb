<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="circle.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Advertising Services | Routz & Beyond Mumbai</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #0d47a1;
            --accent-blue: #1976d2;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --white: #ffffff;
            --bg-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--white); color: var(--text-dark); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* HEADER & LOGO */
        header {
            background: var(--primary-blue);
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-wrapper img { height: 32px; width: auto; }
        .logo-text { color: var(--white); font-weight: 800; font-size: 1.25rem; letter-spacing: 2px; text-transform: uppercase; }

        /* SERVICE PAGE MAIN CONTENT */
        .service-content {
            padding: 80px 5%;
            text-align: center;
        }
        .service-content h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
            margin-bottom: 25px;
        }
        .intro-paragraph {
            max-width: 800px;
            margin: 0 auto;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* CONTACT FORM SECTION */
        #service-inquiry {
            padding: 80px 5%;
            background: var(--bg-light);
            text-align: center;
        }
        #service-inquiry form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #service-inquiry input, #service-inquiry textarea, #service-inquiry select {
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            outline: none;
            background: var(--white);
        }
        #service-inquiry input:focus, #service-inquiry textarea:focus {
            border-color: var(--primary-blue);
        }
        .phone-group { display: flex; gap: 10px; }
        .phone-group select { width: 100px; }

        #service-inquiry button {
            background: var(--primary-blue);
            color: var(--white);
            padding: 18px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #service-inquiry button:hover { background: var(--accent-blue); }

        /* CONTACT STRIP */
        .contact-strip {
            background: var(--text-dark);
            padding: 30px 5%;
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .service-content h1 { font-size: 2.2rem; }
            .logo-wrapper img { height: 24px; }
            .logo-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="logo-wrapper">
            <img src="../circle.png" alt="Icon">
            <div class="logo-text">Routz & Beyond</div>
        </a>
    </header>

    <div class="service-content">
        <h1>Retail Advertising Across India</h1>
        <p class="intro-paragraph">
            Specialized in-store branding and shopper marketing solutions. We influence purchase decisions right at the point of sale. We deliver our services across all cities such as Mumbai, Delhi, Bangalor, Hyderabad, Kolkata, etc.
        </p>
    </div>

    <section id="service-inquiry">
        <form action="https://formspree.io/f/XPQAKYGN" method="POST">
            <input type="hidden" name="service" value="Event Sponsorship">

            <input type="text" name="name" placeholder="Full Name / Company Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <div class="phone-group">
                <select name="code">
                    <option>+91</option>
                    <option>+971</option>
                </select>
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>
            <textarea name="message" rows="4" placeholder="Tell us about your sponsorship goals..."></textarea>
            <button type="submit">Submit Sponsorship Inquiry</button>
        </form>
    </section>



</body>
</html>
